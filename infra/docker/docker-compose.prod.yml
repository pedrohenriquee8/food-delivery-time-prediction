services:
  redis:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/pedrohenriquee8/food-delivery-time-prediction}/redis:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/pedrohenriquee8/food-delivery-time-prediction}/api:${IMAGE_TAG:-latest}
    pull_policy: always
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/pedrohenriquee8/food-delivery-time-prediction}/worker:${IMAGE_TAG:-latest}
    pull_policy: always
    command: python -m apps.api.worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  web:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/pedrohenriquee8/food-delivery-time-prediction}/web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:

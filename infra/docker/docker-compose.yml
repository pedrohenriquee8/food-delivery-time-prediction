# Development stack with bind mounts. For production, use docker-compose.prod.yml.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ../..:/app

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    command: python -m apps.api.worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ../..:/app

volumes:
  redis_data:
